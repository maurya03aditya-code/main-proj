</head>
<body>

</audio>

<div class="paper image">

<div class="paper red">

  <p>Person 😍</p>
</div>

<div class="paper">
  <p>You are Cute</p>
  <p>Amazing ❤️</p>
</div>

<div class="paper">
  <p>Drag the papers to move 💌</p>
</div>

<script>
const music = document.getElementById("bgMusic");

document.addEventListener("click", () => {
  music.play();
  music.volume = 0.5;
}, { once: true });


const papers = document.querySelectorAll(".paper");

papers.forEach(paper => {
  let offsetX = 0, offsetY = 0, isDragging = false;

  const startDrag = (e) => {
    isDragging = true;
    const rect = paper.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    offsetX = clientX - rect.left;
    offsetY = clientY - rect.top;
    paper.style.cursor = "grabbing";
  };

  const drag = (e) => {
    if (!isDragging) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    paper.style.left = clientX - offsetX + "px";
    paper.style.top = clientY - offsetY + "px";
  };

  const stopDrag = () => {
    isDragging = false;
    paper.style.cursor = "grab";
  };

  paper.addEventListener("mousedown", startDrag);
  paper.addEventListener("mousemove", drag);
  paper.addEventListener("mouseup", stopDrag);

  paper.addEventListener("touchstart", startDrag);
  paper.addEventListener("touchmove", drag);
  paper.addEventListener("touchend", stopDrag);
});
</script>

</body>
</html>
